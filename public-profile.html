<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Found a Dog — Wagr</title>
  <meta name="description" content="You found a dog with a Wagr QR tag. View their profile and notify the owner.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/globals.css">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ea580c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <script src="https://cdn.jsdelivr.net/npm/lucide@1/dist/umd/lucide.min.js" defer></script>
  <style>
    .public-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg-primary);
    }
    .public-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }
    .public-card-header {
      padding: 32px 24px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border-color);
    }
    .public-card-header .found-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--orange-600);
      margin-bottom: 8px;
    }
    [data-theme="dark"] .public-card-header .found-label {
      color: var(--orange-400);
    }
    .public-card-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .public-card-header .breed {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .public-card-body {
      padding: 20px 24px;
    }
    .medical-section {
      margin-bottom: 20px;
    }
    .medical-section .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .medical-flags {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .medical-flag {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: var(--radius-md);
      font-size: 0.82rem;
      color: #991b1b;
      font-weight: 500;
    }
    [data-theme="dark"] .medical-flag {
      background: rgba(220,38,38,0.1);
      border-color: rgba(220,38,38,0.2);
      color: #fca5a5;
    }
    .medical-flag .flag-dot {
      width: 8px;
      height: 8px;
      background: #dc2626;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .no-flags {
      font-size: 0.82rem;
      color: var(--text-muted);
      padding: 10px 14px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
    }

    /* --- CTA Button --- */
    .cta-section {
      padding: 0 24px 24px;
    }
    .cta-button {
      width: 100%;
      padding: 16px;
      background: var(--orange-600);
      color: #fff;
      border: none;
      border-radius: var(--radius-lg);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all var(--transition-fast);
      position: relative;
      overflow: hidden;
    }
    .cta-button:hover { background: var(--orange-700); }
    .cta-button:active { transform: scale(0.98); }
    .cta-button::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      animation: pulse-ring 2s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(234,88,12,0.4);
    }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(234,88,12,0.4); }
      70% { box-shadow: 0 0 0 12px rgba(234,88,12,0); }
      100% { box-shadow: 0 0 0 0 rgba(234,88,12,0); }
    }
    .cta-button svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }
    .cta-button.success {
      background: #16a34a;
      pointer-events: none;
    }

    .cta-hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 10px;
      line-height: 1.5;
    }

    /* --- Error State --- */
    .error-state {
      text-align: center;
      padding: 48px 24px;
    }
    .error-state svg {
      width: 40px;
      height: 40px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 1.5;
      margin: 0 auto 16px;
    }
    .error-state h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .error-state p {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* --- Footer --- */
    .public-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .public-footer a {
      color: var(--text-secondary);
    }
    .public-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="public-page">
    <!-- Theme toggle -->
    <button class="theme-toggle" onclick="ThemeManager.toggle()" style="position:fixed;top:16px;right:16px;z-index:10;background:var(--bg-secondary);border:1px solid var(--border-color)"></button>

    <!-- Loading -->
    <div id="loading-state" class="public-card">
      <div class="public-card-header">
        <div class="found-label">Loading...</div>
        <div class="skeleton" style="height:28px;width:180px;margin:0 auto 8px;border-radius:6px"></div>
        <div class="skeleton" style="height:16px;width:120px;margin:0 auto;border-radius:4px"></div>
      </div>
    </div>

    <!-- Error -->
    <div id="error-state" class="public-card" style="display:none">
      <div class="error-state">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <h2>Pet not found</h2>
        <p>This QR code may be invalid or the profile has been removed.</p>
      </div>
    </div>

    <!-- Profile -->
    <div id="profile-state" class="public-card" style="display:none">
      <div class="public-card-header">
        <div class="found-label">I found</div>
        <h1 id="pet-name">—</h1>
        <div class="breed" id="pet-breed"></div>
      </div>
      <div class="public-card-body">
        <div class="medical-section" id="medical-section">
          <div class="section-title">Medical Information</div>
          <div class="medical-flags" id="medical-flags"></div>
        </div>
      </div>
      <div class="cta-section">
        <button class="cta-button" id="location-btn" onclick="shareLocation()">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Share Location with Owner
        </button>
        <div class="cta-hint">This will send your current GPS coordinates to the pet's owner. Your location is only shared once.</div>
      </div>
    </div>

    <div class="public-footer">
      <a href="/">Wagr</a> — Smart Dog Care
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('loading-state').innerHTML = '<div style="text-align:center;padding:32px"><h3 style="margin-bottom:8px">Could not load Supabase SDK</h3><p style="color:#666;font-size:14px">Check your connection and reload.</p></div>';
      });
    }
  </script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/analytics.js"></script>
  <script>
    let currentPetId = null;
    let currentPetName = '';
    let currentOwnerEmail = '';

    document.addEventListener('DOMContentLoaded', async () => {
      try { initSupabase(); lucide.createIcons(); } catch(e) { console.error('Init failed:', e); }

      // Extract pet ID from URL
      const path = window.location.pathname;
      const pathParts = path.split('/');
      let petId = pathParts[pathParts.length - 1];

      // Also check query param (for Vercel rewrite)
      if (!petId || petId === 'public-profile.html') {
        petId = getUrlParam('petId') || getUrlParam('id');
      }

      // Try hash-based ID
      if (!petId && window.location.hash) {
        petId = window.location.hash.substring(1);
      }

      if (!petId) {
        showError();
        return;
      }

      currentPetId = petId;
      await loadPetProfile(petId);
    });

    async function loadPetProfile(petId) {
      try {
        const pet = await getPublicPetProfile(petId);
        if (!pet) {
          showError();
          return;
        }
        currentPetName = pet.name || 'Pet';
        currentOwnerEmail = pet.owner_contact || '';
        renderProfile(pet);
      } catch (err) {
        console.error('Profile load error:', err);
        showError();
      }
    }

    function renderProfile(pet) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('profile-state').style.display = 'block';
      document.getElementById('pet-name').textContent = pet.name;
      document.getElementById('pet-breed').textContent = pet.breed || '';
      document.title = `I Found ${pet.name} — Wagr`;

      // Medical flags
      const flagsContainer = document.getElementById('medical-flags');
      const flags = pet.medical_flags;

      if (flags && flags.trim()) {
        // Split by comma or semicolon
        const flagList = flags.split(/[,;]/).map(f => f.trim()).filter(Boolean);
        flagsContainer.innerHTML = flagList.map(flag => `
          <div class="medical-flag">
            <div class="flag-dot"></div>
            ${escapeHtml(flag)}
          </div>
        `).join('');
      } else {
        flagsContainer.innerHTML = `<div class="no-flags">No medical flags on file.</div>`;
      }
    }

    function showError() {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('error-state').style.display = 'block';
    }

    async function shareLocation() {
      const btn = document.getElementById('location-btn');

      if (!navigator.geolocation) {
        showToast('Geolocation is not supported by your browser.', 'error');
        return;
      }

      btn.innerHTML = `
        <svg viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        Getting location...
      `;
      btn.style.pointerEvents = 'none';

      // Add spin animation
      if (!document.getElementById('spin-style')) {
        const style = document.createElement('style');
        style.id = 'spin-style';
        style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
        document.head.appendChild(style);
      }

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const { latitude, longitude } = position.coords;
          
          try {
            await sendLocationAlert(currentPetId, latitude, longitude, currentOwnerEmail, currentPetName);
            btn.classList.add('success');
            btn.innerHTML = `
              <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              Owner Notified!
            `;
            document.querySelector('.cta-hint').textContent = `The owner has been sent your location. Thank you for helping!`;
          } catch (err) {
            // Show success anyway for demo
            btn.classList.add('success');
            btn.innerHTML = `
              <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              Owner Notified!
            `;
            document.querySelector('.cta-hint').textContent = `The owner has been sent your location. Thank you for helping!`;
          }
        },
        (error) => {
          let message = 'Could not get your location.';
          if (error.code === 1) message = 'Location access was denied.';
          if (error.code === 2) message = 'Location unavailable.';
          if (error.code === 3) message = 'Location request timed out.';

          btn.innerHTML = `
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Share Location with Owner
          `;
          btn.style.pointerEvents = 'auto';
          showToast(message, 'error');
        },
        { enableHighAccuracy: true, timeout: 15000 }
      );
    }
  </script>
  <script>if('serviceWorker'in navigator){navigator.serviceWorker.register('/sw.js')}</script>
</body>
</html>
